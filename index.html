<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Sets | Treasure Valley Tech Tavern</title>
  <style>
    :root {
      color-scheme: dark;
      --tvtt-bg: #000;
      --tvtt-panel: #121212;
      --tvtt-text: #f4f6f7;
      --tvtt-muted: #aeb7bd;
      --tvtt-cyan: #63e0e5;
      --tvtt-red: #ff1637;
      --tvtt-card: 320px;
      --tvtt-card-h: 570px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--tvtt-bg);
      color: var(--tvtt-text);
      font-family: "Arial Narrow", "Roboto Condensed", Impact, system-ui, sans-serif;
    }

    .tvtt-live-page {
      min-height: 100vh;
      overflow-x: hidden;
      background: #000;
    }

    .tvtt-live-hero {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 264px;
      padding: 46px 18px 70px;
      overflow: hidden;
      text-align: center;
      background: #141414;
    }

    .tvtt-live-hero:after {
      position: absolute;
      right: -8%;
      bottom: -28px;
      left: -8%;
      height: 54px;
      content: "";
      background: #000;
      border-radius: 50% 50% 0 0;
    }

    .tvtt-live-title {
      margin: 0;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 4.2rem;
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .tvtt-live-kicker {
      margin: 26px 0 0;
      color: var(--tvtt-muted);
      font-size: 1.1rem;
      line-height: 1.4;
    }

    .tvtt-show {
      padding: 78px 0 18px;
      background: #000;
    }

    .tvtt-show:first-of-type {
      padding-top: 94px;
    }

    .tvtt-show-heading {
      width: min(100%, 920px);
      margin: 0 auto 44px;
      padding: 0 28px;
      color: var(--tvtt-cyan);
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 3.2rem;
      line-height: 1.05;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .tvtt-video-track {
      display: flex;
      gap: 20px;
      width: 100%;
      overflow-x: auto;
      padding: 0 60px 24px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--tvtt-cyan) #111;
    }

    .tvtt-video-track::-webkit-scrollbar {
      height: 12px;
    }

    .tvtt-video-track::-webkit-scrollbar-track {
      background: #111;
    }

    .tvtt-video-track::-webkit-scrollbar-thumb {
      background: var(--tvtt-cyan);
      border-radius: 8px;
    }

    .tvtt-video-item {
      position: relative;
      flex: 0 0 auto;
      width: var(--tvtt-card);
      height: var(--tvtt-card-h);
      overflow: hidden;
      scroll-snap-align: start;
      background: var(--tvtt-panel);
      border-radius: 8px;
    }

    .tvtt-video-item iframe,
    .tvtt-video-item img {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .tvtt-video-item img {
      object-fit: cover;
    }

    .tvtt-video-thumb {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      padding: 0;
      cursor: pointer;
      background: #111;
      border: 0;
      color: inherit;
      font: inherit;
    }

    .tvtt-video-thumb:before {
      position: absolute;
      inset: 0;
      z-index: 1;
      content: "";
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 34%, rgba(0, 0, 0, 0.18)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.16), transparent 26%, rgba(0, 0, 0, 0.2));
      transition: background 160ms ease;
    }

    .tvtt-video-thumb:hover:before,
    .tvtt-video-thumb:focus-visible:before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.36), transparent 36%, rgba(0, 0, 0, 0.08)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.08), transparent 26%, rgba(0, 0, 0, 0.12));
    }

    .tvtt-video-thumb:focus-visible {
      outline: 3px solid var(--tvtt-cyan);
      outline-offset: -3px;
    }

    .tvtt-thumb-label {
      position: absolute;
      top: 16px;
      right: 16px;
      left: 16px;
      z-index: 2;
      display: grid;
      gap: 4px;
      text-align: left;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.88);
    }

    .tvtt-thumb-title {
      overflow: hidden;
      font-family: Arial, sans-serif;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tvtt-thumb-channel {
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .tvtt-play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 2;
      display: grid;
      width: 70px;
      height: 52px;
      place-items: center;
      background: var(--tvtt-red);
      border-radius: 8px;
      transform: translate(-50%, -50%);
      transition: transform 160ms ease, background 160ms ease;
    }

    .tvtt-video-thumb:hover .tvtt-play-icon,
    .tvtt-video-thumb:focus-visible .tvtt-play-icon {
      background: #ff304b;
      transform: translate(-50%, -50%) scale(1.04);
    }

    .tvtt-play-icon:after {
      width: 0;
      height: 0;
      margin-left: 4px;
      content: "";
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 18px solid #fff;
    }

    @media screen and (max-width: 1100px) {
      :root {
        --tvtt-card: 280px;
        --tvtt-card-h: 500px;
      }

      .tvtt-video-track {
        padding-right: 30px;
        padding-left: 30px;
      }
    }

    @media screen and (max-width: 600px) {
      :root {
        --tvtt-card: 280px;
        --tvtt-card-h: 498px;
      }

      .tvtt-live-hero {
        min-height: 226px;
        padding-top: 38px;
      }

      .tvtt-live-title {
        font-size: 3rem;
      }

      .tvtt-live-kicker {
        font-size: 1rem;
      }

      .tvtt-show {
        padding-top: 58px;
      }

      .tvtt-show-heading {
        font-size: 2rem;
        margin-bottom: 28px;
        padding: 0 16px;
      }

      .tvtt-video-track {
        gap: 16px;
        padding: 0 16px 20px;
      }
    }
  </style>
</head>

  <script>
    document.addEventListener("click", function (event) {
      const thumb = event.target.closest(".tvtt-video-thumb");

      if (!thumb) {
        return;
      }

      const videoId = thumb.dataset.videoId;
      const title = thumb.dataset.title || "Treasure Valley Tech Tavern video";
      const iframe = document.createElement("iframe");

      iframe.src = "https://www.youtube.com/embed/" + encodeURIComponent(videoId) + "?autoplay=1&rel=0";
      iframe.title = title;
      iframe.loading = "lazy";
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      iframe.allowFullscreen = true;

      thumb.replaceWith(iframe);
    });
  </script>
